<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koala Network</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
        h1 { color: #0f0; }
        .container { max-width: 500px; margin: 0 auto; }
        input[type="file"] { display: none; }
        .upload-btn {
            background: #0f0; color: #000; padding: 15px 30px;
            font-size: 18px; border-radius: 10px; cursor: pointer;
            display: inline-block; margin-top: 20px;
        }
        #preview, #result { max-width: 100%; margin-top: 20px; border: 2px solid #333; border-radius: 10px; }
        #status { margin-top: 20px; font-size: 14px; color: #aaa; }
        .loader { border: 4px solid #333; border-top: 4px solid #0f0; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Koala Mesh</h1>
        <p>شبكة معالجة موزعة حقيقية</p>
        
        <label for="fileInput" class="upload-btn">اختر صورة</label>
        <input type="file" id="fileInput" accept="image/*" capture="environment">
        
        <img id="preview" src="" alt="">
        
        <button onclick="startProcess()" style="background:#fff; padding:10px 20px; margin-top:10px; border:none; border-radius:5px; cursor:pointer;">ابدأ المعالجة المشتركة</button>
        
        <div class="loader" id="loader"></div>
        <div id="status"></div>
        
        <img id="result" src="" alt="" style="display:none;">
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const result = document.getElementById('result');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        
        fileInput.onchange = e => {
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            }
        };

        async function startProcess() {
            if (!fileInput.files[0]) return alert("اختر صورة أولاً");
            
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            loader.style.display = 'block';
            status.innerText = "📡 جاري الرفع والتوزيع...";
            result.style.display = 'none';

            try {
                const response = await fetch('/process_network', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('فشل المعالجة');

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                result.src = url;
                result.style.display = 'block';
                status.innerText = "✅ تمت المعالجة بنجاح! (نصف بفلتر، نصف بذكاء اصطناعي)";
                loader.style.display = 'none';

            } catch (err) {
                status.innerText = "❌ حدث خطأ: " + err.message;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
